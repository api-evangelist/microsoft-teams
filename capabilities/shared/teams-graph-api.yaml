naftiko: "1.0.0-alpha1"

info:
  label: "Microsoft Graph Teams API"
  description: "REST API for managing Teams resources including teams, channels, messages, members, meetings, and calls via Microsoft Graph."
  tags:
    - Microsoft Teams
    - Collaboration
    - Microsoft Graph
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MICROSOFT_GRAPH_TOKEN: MICROSOFT_GRAPH_TOKEN

capability:
  consumes:
    - type: http
      namespace: teams-graph
      baseUri: https://graph.microsoft.com/v1.0
      description: "Microsoft Graph Teams API."
      authentication:
        type: bearer
        token: "{{MICROSOFT_GRAPH_TOKEN}}"
      resources:
        - name: teams
          path: /teams
          description: "Team operations."
          operations:
            - name: list-joined-teams
              method: GET
              description: "List teams the user has joined."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-team
              method: POST
              description: "Create a new team."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  displayName: "{{tools.displayName}}"
                  description: "{{tools.description}}"
        - name: channels
          path: /teams/{team-id}/channels
          description: "Channel operations."
          operations:
            - name: list-channels
              method: GET
              description: "List channels in a team."
              inputParameters:
                - name: team-id
                  in: path
                  type: string
                  required: true
                  description: "The team ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-channel
              method: POST
              description: "Create a new channel."
              inputParameters:
                - name: team-id
                  in: path
                  type: string
                  required: true
                  description: "The team ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  displayName: "{{tools.displayName}}"
        - name: messages
          path: /teams/{team-id}/channels/{channel-id}/messages
          description: "Message operations."
          operations:
            - name: list-channel-messages
              method: GET
              description: "List messages in a channel."
              inputParameters:
                - name: team-id
                  in: path
                  type: string
                  required: true
                  description: "The team ID."
                - name: channel-id
                  in: path
                  type: string
                  required: true
                  description: "The channel ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: send-channel-message
              method: POST
              description: "Send a message to a channel."
              inputParameters:
                - name: team-id
                  in: path
                  type: string
                  required: true
                  description: "The team ID."
                - name: channel-id
                  in: path
                  type: string
                  required: true
                  description: "The channel ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  body: "{{tools.body}}"
        - name: members
          path: /teams/{team-id}/members
          description: "Member operations."
          operations:
            - name: list-team-members
              method: GET
              description: "List members in a team."
              inputParameters:
                - name: team-id
                  in: path
                  type: string
                  required: true
                  description: "The team ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-team-member
              method: POST
              description: "Add a member to a team."
              inputParameters:
                - name: team-id
                  in: path
                  type: string
                  required: true
                  description: "The team ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: meetings
          path: /communications/onlineMeetings
          description: "Online meeting operations."
          operations:
            - name: create-online-meeting
              method: POST
              description: "Create an online meeting."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  subject: "{{tools.subject}}"
        - name: calls
          path: /communications/calls
          description: "Call operations."
          operations:
            - name: create-call
              method: POST
              description: "Create a new call."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9100
      namespace: teams-graph-mcp
      transport: http
      tools:
        - name: list-joined-teams
          description: "List teams the user has joined."
          hints:
            readOnly: true
          call: "teams-graph.list-joined-teams"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-team
          description: "Create a new team."
          hints:
            readOnly: false
          call: "teams-graph.create-team"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-channels
          description: "List channels in a team."
          hints:
            readOnly: true
          call: "teams-graph.list-channels"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-channel
          description: "Create a channel in a team."
          hints:
            readOnly: false
          call: "teams-graph.create-channel"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-channel-messages
          description: "List messages in a channel."
          hints:
            readOnly: true
          call: "teams-graph.list-channel-messages"
          outputParameters:
            - type: object
              mapping: "$."
        - name: send-channel-message
          description: "Send a message to a channel."
          hints:
            readOnly: false
          call: "teams-graph.send-channel-message"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-team-members
          description: "List members in a team."
          hints:
            readOnly: true
          call: "teams-graph.list-team-members"
          outputParameters:
            - type: object
              mapping: "$."
        - name: add-team-member
          description: "Add a member to a team."
          hints:
            readOnly: false
          call: "teams-graph.add-team-member"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-online-meeting
          description: "Create an online meeting."
          hints:
            readOnly: false
          call: "teams-graph.create-online-meeting"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-call
          description: "Create a call."
          hints:
            readOnly: false
          call: "teams-graph.create-call"
          outputParameters:
            - type: object
              mapping: "$."
