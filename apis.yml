aid: microsoft-teams
name: Microsoft Teams
description: >-
  Microsoft Teams is a collaboration platform that combines workplace chat,
  meetings, file storage, and application integration. It provides APIs for
  building custom integrations, managing teams and channels, sending messages,
  scheduling meetings, and initiating calls through Microsoft Graph.
image: https://learn.microsoft.com/en-us/graph/images/teams-logo.png
url: https://raw.githubusercontent.com/api-evangelist/microsoft-teams/refs/heads/main/apis.yml
humanURL: https://www.microsoft.com/en-us/microsoft-teams
created: '2024'
modified: '2026-04-18'
specificationVersion: '0.19'
type: Index
tags:
