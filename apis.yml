  - Collaboration
  - Communication
  - Microsoft 365
  - Productivity
  - Video Conferencing
apis:
  - name: Microsoft Graph Teams API
    description: >-
      Core REST API for accessing Teams data including teams, channels, messages,
      tabs, apps, members, online meetings, and calls through Microsoft Graph.
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/teams-api-overview
    baseURL: https://graph.microsoft.com/v1.0
